{% extends "base.html" %}

{% block title %}Add Meal - WellTrack AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 text-warning">
                    <i class="fas fa-utensils me-2"></i>Add New Meal
                </h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Meal Name / Type</label>
                        <input type="text" name="meal_type" class="form-control" required placeholder="e.g. Grilled Chicken, Salad">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Calories</label>
                        <input type="number" name="calories" class="form-control" required min="0">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        <i class="fas fa-plus me-2"></i>Add Meal
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
