<!DOCTYPE html>
<html>
<head>
    <title>Edit Sleep</title>
</head>
<body>
    <h2>Edit Sleep Record</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Duration:</label><br>
        <input type="number" step="0.1" name="duration" value="{{ sleep.duration }}" required><br><br>

        <label>Quality:</label><br>
        <input type="text" name="quality" value="{{ sleep.quality }}" required><br><br>

        <button type="submit">Update Sleep</button>
    </form>

    <br>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
