{% extends "base.html" %}

{% block title %}Add Sleep - WellTrack AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 text-info">
                    <i class="fas fa-bed me-2"></i>Log Sleep
                </h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Duration (hours)</label>
                        <input type="number" step="0.1" name="duration" class="form-control" required min="0.5" max="24">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Quality (Optional)</label>
                        <input type="text" name="quality" class="form-control" placeholder="Good, Fair, Poor...">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        <i class="fas fa-plus me-2"></i>Save Sleep
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
