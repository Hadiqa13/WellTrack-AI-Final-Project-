<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Sleep - WellTrack AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header>
<nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add_workout_page') }}">Add Workout</a>
    <a href="{{ url_for('add_meal_page') }}">Add Meal</a>
    <a href="{{ url_for('add_sleep_page') }}">Add Sleep</a>
    <a href="{{ url_for('ai_insights_page') }}">AI Insights</a>
</nav>
</header>

<main>
<h1>Add Sleep</h1>
<form method="POST" action="{{ url_for('add_sleep_page') }}">
<label>Duration (hours):</label>
<input type="number" step="0.1" name="duration" required>

<label>Quality:</label>
<input type="text" name="quality">

<button type="submit">Add Sleep</button>
</form>
</main>
</body>
