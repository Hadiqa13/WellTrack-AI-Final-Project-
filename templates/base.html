<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WellTrack AI{% endblock %}</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Icons (Optional but nice) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                    <i class="fas fa-heartbeat"></i> WellTrack AI
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" 
                               href="{{ url_for('dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'add_workout_page' %}active{% endif %}" 
                               href="{{ url_for('add_workout_page') }}">Add Workout</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'add_meal_page' %}active{% endif %}" 
                               href="{{ url_for('add_meal_page') }}">Add Meal</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'add_sleep_page' %}active{% endif %}" 
                               href="{{ url_for('add_sleep_page') }}">Add Sleep</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'ai_insights_page' %}active{% endif %}" 
                               href="{{ url_for('ai_insights_page') }}">AI Insights</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
