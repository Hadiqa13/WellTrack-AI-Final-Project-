{% extends "base.html" %}

{% block title %}Add Workout - WellTrack AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 text-success">
                    <i class="fas fa-dumbbell me-2"></i>Add New Workout
                </h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Workout Type</label>
                        <input type="text" name="workout_type" class="form-control" required placeholder="e.g. Running, Gym, Yoga">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" name="duration" class="form-control" required min="1">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Calories Burned</label>
                        <input type="number" name="calories_burned" class="form-control" placeholder="Optional">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        <i class="fas fa-plus me-2"></i>Add Workout
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
