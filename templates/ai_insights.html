<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wellness Insights</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #666;
        }

        .btn-box {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f9fafc;
            border: 1px solid #ddd;
            border-radius: 10px;
            min-height: 150px;
            white-space: pre-wrap;
            color: #222;
        }

        .loading {
            color: #007bff;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Wellness Insights</h1>
        <p>Click the button below to generate personalized wellness insights.</p>

        <div class="btn-box">
            <button onclick="getInsights()">Generate Insights</button>
        </div>

        <div id="result" class="result-box">
            Your AI wellness insights will appear here.
        </div>
    </div>

    <script>
        async function getInsights() {
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = '<span class="loading">Loading insights...</span>';

            try {
                const response = await fetch("/ai/insights");
                const text = await response.text();

                try {
                    const data = JSON.parse(text);

                    if (data.status === "success") {
                        resultDiv.textContent = data.insights;
                    } else {
                        resultDiv.innerHTML = '<span class="error">Could not load insights.</span>';
                    }
                } catch (jsonError) {
                    resultDiv.innerHTML = '<span class="error">' + text.replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</span>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
    </script>
</body>
</html>
