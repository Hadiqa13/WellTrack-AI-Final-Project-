<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wellness Insights</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #666;
        }

        .btn-box {
            text-align: center;
            margin-top: 20px;
        }

        .btn-link {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }

        .btn-link:hover {
            background-color: #45a049;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f9fafc;
            border: 1px solid #ddd;
            border-radius: 10px;
            min-height: 120px;
            white-space: pre-wrap;
            color: #222;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Wellness Insights</h1>
        <p>Click the button below to generate personalized wellness insights.</p>

        <div class="btn-box">
            <!-- This will generate insights and redirect to dashboard -->
            <a href="/generate-insights" class="btn-link">Generate Insights</a>
        </div>

        <div class="result-box">
            After clicking the button, you will be redirected to the dashboard and the AI insights will appear there.
        </div>
    </div>
</body>
</html>
