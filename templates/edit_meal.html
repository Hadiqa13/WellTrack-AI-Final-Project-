<!DOCTYPE html>
<html>
<head>
    <title>Edit Meal</title>
</head>
<body>
    <h2>Edit Meal</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Meal Type:</label><br>
        <input type="text" name="meal_type" value="{{ meal.meal_type }}" required><br><br>

        <label>Calories:</label><br>
        <input type="number" name="calories" value="{{ meal.calories }}" required><br><br>

        <button type="submit">Update Meal</button>
    </form>

    <br>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
